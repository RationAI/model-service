groupName: cpu-workers
replicas: 0
minReplicas: 0
maxReplicas: 2
template:
  spec:
    securityContext:
      fsGroupChangePolicy: OnRootMismatch
      runAsNonRoot: true
      seccompProfile:
        type: RuntimeDefault
    containers:
    - name: ray-worker
      image: cerit.io/rationai/model-service:2.53.0
      imagePullPolicy: Always
      resources:
        limits:
          cpu: 8
          memory: 16Gi
        requests:
          cpu: 8
          memory: 16Gi
      env:
      - name: HTTPS_PROXY
        value: http://proxy.ics.muni.cz:3128
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop:
          - ALL
        runAsUser: 1000
      lifecycle:
        preStop:
          exec:
            command:
            - /bin/sh
            - -c
            - ray stop
      volumeMounts:
      - name: data
        mountPath: /mnt/data
      - name: public-data
        mountPath: /mnt/data/Public
      - name: projects
        mountPath: /mnt/projects
      - name: bioptic-tree
        mountPath: /mnt/bioptic_tree
      - name: trt-cache-volume
        mountPath: /mnt/cache
      - name: huggingface-cache
        mountPath: /mnt/huggingface_cache
    volumes:
    - name: data
      persistentVolumeClaim:
        claimName: data-ro
    - name: public-data
      persistentVolumeClaim:
        claimName: rationai-data-ro-pvc-jobs
    - name: projects
      persistentVolumeClaim:
        claimName: projects-rw
    - name: bioptic-tree
      persistentVolumeClaim:
        claimName: bioptictree-ro
    - name: trt-cache-volume
      persistentVolumeClaim:
        claimName: tensorrt-cache-pvc
    - name: huggingface-cache
      persistentVolumeClaim:
        claimName: huggingface-cache-pvc

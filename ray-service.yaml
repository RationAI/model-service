apiVersion: ray.io/v1
kind: RayService
metadata:
  name: rayservice-model
spec:
  serveConfigV2: |
    applications:
      - name: prostate-classifier-1
        import_path: models.binary_classifier:app
        route_prefix: /prostate-classifier-1
        runtime_env:
          working_dir: https://github.com/RationAI/model-service/archive/refs/heads/feature/main.zip
        deployments:
          - name: BinaryClassifier
            max_ongoing_requests: 38
            max_queued_requests: 512
            autoscaling_config:
              min_replicas: 0
              max_replicas: 4
              target_ongoing_requests: 24
            ray_actor_options:
              num_cpus: 8
              num_gpus: 1
              memory: 8589934592 # 8 GiB
              runtime_env:
                env_vars:
                  MLFLOW_TRACKING_URI: http://mlflow.rationai-mlflow:5000
            user_config:
              tile_size: 512
              max_batch_size: 64
              batch_wait_timeout_s: 0.05
              trt_max_workspace_size: 8589934592 # 8 GiB
              trt_cache_path: /mnt/cache/trt_cache
              model:
                _target_: providers.model_provider:mlflow
                artifact_uri: mlflow-artifacts:/65/aebc892f526047249b972f200bef4381/artifacts/checkpoints/epoch=0-step=6972/prostate_model_norm.onnx

      - name: episeg-1
        import_path: models.semantic_segmentation:app
        route_prefix: /episeg-1
        runtime_env:
          working_dir: https://gitlab.ics.muni.cz/rationai/infrastructure/model-service/-/archive/master/model-service-master.zip
        deployments:
          - name: SemanticSegmentation
            max_ongoing_requests: 16
            max_queued_requests: 32
            autoscaling_config:
              min_replicas: 0
              max_replicas: 2
              target_ongoing_requests: 8
            ray_actor_options:
              num_cpus: 4
              memory: 12884901888 # 12 GiB
              num_gpus: 1
              runtime_env:
                env_vars:
                  MLFLOW_TRACKING_URI: http://mlflow.rationai-mlflow:5000
            user_config:
              tile_size: 1024
              mpp: 0.468
              max_batch_size: 8
              batch_wait_timeout_s: 0.1
              trt_max_workspace_size: 8589934592 # 8 GiB
              trt_cache_path: /mnt/cache/trt_cache
              model:
                _target_: providers.model_provider:mlflow
                artifact_uri: mlflow-artifacts:/10/39f821ed5b964c71a603cc6db196f9fd/artifacts/checkpoints/epoch=19-step=32020/model.onnx/model.onnx


      - name: heatmap-builder
        import_path: builders.heatmap_builder:app
        route_prefix: /heatmap-builder
        runtime_env:
          working_dir: https://gitlab.ics.muni.cz/rationai/infrastructure/model-service/-/archive/master/model-service-master.zip
        deployments:
          - name: HeatmapBuilder
            max_ongoing_requests: 16
            max_queued_requests: 64
            autoscaling_config:
              min_replicas: 0
              max_replicas: 4
              target_ongoing_requests: 2
            ray_actor_options:
              num_cpus: 8
              memory: 12884901888 # 12 GiB
            user_config:
              num_threads: 8
              max_concurrent_tasks: 24

  rayClusterConfig:
    rayVersion: 2.53.0
    enableInTreeAutoscaling: true
    autoscalerOptions:
      idleTimeoutSeconds: 60
      securityContext:
        runAsUser: 1000
        allowPrivilegeEscalation: false
        capabilities:
          drop: ["ALL"]

    headGroupSpec:
      rayStartParams:
        num-cpus: "0"
        dashboard-host: "0.0.0.0"
      template:
        spec:
          securityContext:
            fsGroupChangePolicy: OnRootMismatch
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: ray-head
              image: rayproject/ray:2.53.0-py312
              imagePullPolicy: Always
              resources:
                limits:
                  cpu: 0
                  memory: 4Gi
                requests:
                  cpu: 0
                  memory: 4Gi
              env:
                - name: HTTPS_PROXY
                  value: http://proxy.ics.muni.cz:3128
              ports:
                - containerPort: 6379
                  name: gcs-server
                - containerPort: 8265
                  name: dashboard
                - containerPort: 10001
                  name: client
                - containerPort: 8000
                  name: serve
              securityContext:
                runAsUser: 1000
                allowPrivilegeEscalation: false
                capabilities:
                  drop: ["ALL"]

    workerGroupSpecs:
      - groupName: cpu-workers
        replicas: 0
        minReplicas: 0
        maxReplicas: 2
        template:
          spec:
            securityContext:
              fsGroupChangePolicy: OnRootMismatch
              runAsNonRoot: true
              seccompProfile:
                type: RuntimeDefault
            containers:
              - name: ray-worker
                image: cerit.io/rationai/model-service:2.53.0
                imagePullPolicy: Always
                resources:
                  limits:
                    cpu: 8
                    memory: 16Gi
                  requests:
                    cpu: 8
                    memory: 16Gi
                env:
                  - name: HTTPS_PROXY
                    value: http://proxy.ics.muni.cz:3128
                securityContext:
                  allowPrivilegeEscalation: false
                  capabilities:
                    drop: ["ALL"]
                  runAsUser: 1000
                lifecycle:
                  preStop:
                    exec:
                      command: ["/bin/sh", "-c", "ray stop"]
                volumeMounts:
                  - name: data
                    mountPath: /mnt/data
                  - name: public-data
                    mountPath: /mnt/data/Public
                  - name: projects
                    mountPath: /mnt/projects
                  - name: bioptic-tree
                    mountPath: /mnt/bioptic_tree
                  - name: trt-cache-volume
                    mountPath: /mnt/cache

            volumes:
              - name: data
                persistentVolumeClaim:
                  claimName: data-ro
              - name: public-data
                persistentVolumeClaim:
                  claimName: rationai-data-ro-pvc-jobs
              - name: projects
                persistentVolumeClaim:
                  claimName: projects-rw
              - name: bioptic-tree
                persistentVolumeClaim:
                  claimName: bioptictree-ro
              - name: trt-cache-volume
                persistentVolumeClaim:
                  claimName: tensorrt-cache-pvc

      - groupName: gpu-workers
        replicas: 0
        minReplicas: 0
        maxReplicas: 2
        rayStartParams:
          num-gpus: "1"
        template:
          spec:
            securityContext:
              fsGroup: 1000
              fsGroupChangePolicy: OnRootMismatch
              runAsNonRoot: true
              runAsUser: 1000
              seccompProfile:
                type: RuntimeDefault
            containers:
              - name: ray-worker
                image: cerit.io/rationai/model-service:latest-gpu
                imagePullPolicy: Always
                resources:
                  limits:
                    cpu: 8
                    memory: 24Gi
                    nvidia.com/mig-2g.20gb: 1
                  requests:
                    cpu: 8
                    memory: 24Gi
                env:
                  - name: HTTPS_PROXY
                    value: http://proxy.ics.muni.cz:3128
                securityContext:
                  allowPrivilegeEscalation: false
                  capabilities:
                    drop: ["ALL"]
                  runAsUser: 1000
                lifecycle:
                  preStop:
                    exec:
                      command: ["/bin/sh", "-c", "ray stop"]
                volumeMounts:
                  - name: data
                    mountPath: /mnt/data
                  - name: public-data
                    mountPath: /mnt/data/Public
                  - name: projects
                    mountPath: /mnt/projects
                  - name: bioptic-tree
                    mountPath: /mnt/bioptic_tree
                  - name: trt-cache-volume
                    mountPath: /mnt/cache

            volumes:
              - name: data
                persistentVolumeClaim:
                  claimName: data-ro
              - name: public-data
                persistentVolumeClaim:
                  claimName: rationai-data-ro-pvc-jobs
              - name: projects
                persistentVolumeClaim:
                  claimName: projects-rw
              - name: bioptic-tree
                persistentVolumeClaim:
                  claimName: bioptictree-ro
              - name: trt-cache-volume
                persistentVolumeClaim:
                  claimName: tensorrt-cache-pvc

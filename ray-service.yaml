apiVersion: ray.io/v1
kind: RayService
metadata:
  name: rayservice-models
spec:
  serveConfigV2: |
    applications:
      - name: LSP-DETR
        import_path: models.lsp_detr:app
        route_prefix: /lsp-detr
        runtime_env:
          working_dir: https://gitlab.ics.muni.cz/rationai/infrastructure/model-service/-/archive/develop/model-service-develop.zip?path=models

  rayClusterConfig:
    rayVersion: 2.48.0
    enableInTreeAutoscaling: true
    autoscalerOptions:
      idleTimeoutSeconds: 60 # number of seconds to wait before scaling down a worker pod which is not using Ray resources.
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop: ["ALL"]
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault

    headGroupSpec:
      rayStartParams:
        num-cpus: "0"
        dashboard-host: "0.0.0.0"
      template:
        spec:
          containers:
            - name: ray-head
              image: rayproject/ray:2.48.0-py312
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop: ["ALL"]
                runAsNonRoot: true
                seccompProfile:
                  type: RuntimeDefault
              resources:
                limits:
                  cpu: 0
                  memory: 3Gi
                requests:
                  cpu: 0
                  memory: 3Gi
              ports:
                - containerPort: 6379
                  name: gcs-server
                - containerPort: 8265 # Ray dashboard
                  name: dashboard
                - containerPort: 10001
                  name: client
                - containerPort: 8000
                  name: serve

    workerGroupSpecs:
      - groupName: gpu-group
        replicas: 0
        minReplicas: 0
        maxReplicas: 2
        rayStartParams: {}
        template:
          spec:
            nodeSelector:
              nvidia.com/gpu.product: NVIDIA-A40
            containers:
              - name: ray-worker
                image: rayproject/ray:2.48.0-py312-gpu
                securityContext:
                  allowPrivilegeEscalation: false
                  capabilities:
                    drop: ["ALL"]
                  runAsNonRoot: true
                  seccompProfile:
                    type: RuntimeDefault
                lifecycle:
                  preStop:
                    exec:
                      command: ["/bin/sh", "-c", "ray stop"]
                resources:
                  limits:
                    cpu: 4
                    memory: 10Gi
                    nvidia.com/gpu: 1
                  requests:
                    cpu: 4
                    memory: 10Gi

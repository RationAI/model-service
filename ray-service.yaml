apiVersion: ray.io/v1
kind: RayService
metadata:
  name: rayservice-models
  namespace: rationai-notebooks-ns
spec:
  serveConfigV2: |
    applications:
      # 1. Prostate Model (CPU / ONNX)
      - name: prostate-onnx
        import_path: models.prostate_onnx:app
        route_prefix: /prostate
        runtime_env:
          working_dir: https://gitlab.ics.muni.cz/rationai/infrastructure/model-service/-/archive/develop/model-service-develop.zip?path=models
          pip:
            - mlflow==2.18.0
            - onnxruntime
            - numpy
          env_vars:
            MLFLOW_TRACKING_URI: "http://mlflow.rationai-mlflow.svc.cluster.local:5000"
            HTTP_PROXY: "http://proxy.muni.cz:3128"
            HTTPS_PROXY: "http://proxy.muni.cz:3128"
            NO_PROXY: ".svc.cluster.local,.rationai-mlflow,mlflow.rationai-mlflow,mlflow.rationai-mlflow.svc.cluster.local,localhost,127.0.0.1"
        
        deployments:
          - name: ProstateModel
            autoscaling_config:
              min_replicas: 1
              max_replicas: 2
            ray_actor_options:
              num_cpus: 2

      # 2. Nuclei Detection Model (GPU / LSP-DETR)
      - name: lsp-detr
        import_path: models.lsp_detr:app
        route_prefix: /lsp-detr
        runtime_env:
          working_dir: https://gitlab.ics.muni.cz/rationai/infrastructure/model-service/-/archive/develop/model-service-develop.zip?path=models
          pip:
            - torch
            - torchvision
            - transformers
            - numpy
            - pillow
          env_vars:
            HTTP_PROXY: "http://proxy.muni.cz:3128"
            HTTPS_PROXY: "http://proxy.muni.cz:3128"
            NO_PROXY: ".svc.cluster.local,.rationai-mlflow,localhost,127.0.0.1"

  rayClusterConfig:
    rayVersion: 2.49.2
    enableInTreeAutoscaling: true
    autoscalerOptions:
      idleTimeoutSeconds: 60
      securityContext:
        runAsUser: 1000
        allowPrivilegeEscalation: false
        capabilities:
          drop: ["ALL"]

    headGroupSpec:
      rayStartParams:
        num-cpus: "0"
        dashboard-host: "0.0.0.0"
      template:
        spec:
          securityContext:
            fsGroupChangePolicy: OnRootMismatch
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: ray-head
              image: rayproject/ray:2.49.2-py312
              resources:
                limits:
                  cpu: 0
                  memory: 4Gi
                requests:
                  cpu: 0
                  memory: 4Gi
              ports:
                - containerPort: 6379
                  name: gcs-server
                - containerPort: 8265
                  name: dashboard
                - containerPort: 10001
                  name: client
                - containerPort: 8000
                  name: serve
              env:
                - name: HTTPS_PROXY
                  value: http://proxy.muni.cz:3128
                - name: NO_PROXY
                  value: .svc.cluster.local,.rationai-mlflow,localhost,127.0.0.1
              securityContext:
                runAsUser: 1000
                allowPrivilegeEscalation: false
                capabilities:
                  drop: ["ALL"]

    workerGroupSpecs:
      - groupName: cpu-workers
        replicas: 1
        minReplicas: 1
        maxReplicas: 4
        template:
          spec:
            securityContext:
              fsGroupChangePolicy: OnRootMismatch
              runAsNonRoot: true
              seccompProfile:
                type: RuntimeDefault
            containers:
              - name: ray-worker
                image: rayproject/ray:2.49.2-py312
                resources:
                  limits:
                    cpu: 4
                    memory: 8Gi
                  requests:
                    cpu: 2
                    memory: 4Gi
                env:
                  - name: HTTP_PROXY
                    value: "http://proxy.muni.cz:3128"
                  - name: HTTPS_PROXY
                    value: "http://proxy.muni.cz:3128"
                  - name: NO_PROXY
                    value: ".svc.cluster.local,.rationai-mlflow,localhost,127.0.0.1"
                securityContext:
                  allowPrivilegeEscalation: false
                  capabilities:
                    drop: ["ALL"]
                  runAsUser: 1000
                lifecycle:
                  preStop:
                    exec:
                      command: ["/bin/sh", "-c", "ray stop"]

      - groupName: a40-group
        replicas: 0
        minReplicas: 0
        maxReplicas: 2
        template:
          spec:
            securityContext:
              fsGroupChangePolicy: OnRootMismatch
              runAsNonRoot: true
              seccompProfile:
                type: RuntimeDefault
            nodeSelector:
              nvidia.com/gpu.product: NVIDIA-A40
            containers:
              - name: ray-worker
                image: rayproject/ray:2.49.2-py312-gpu
                resources:
                  limits:
                    cpu: 4
                    memory: 10Gi
                    nvidia.com/gpu: 1
                  requests:
                    cpu: 4
                    memory: 10Gi
                    nvidia.com/gpu: 1
                env:
                  - name: HTTPS_PROXY
                    value: http://proxy.muni.cz:3128
                  - name: NO_PROXY
                    value: .svc.cluster.local,.rationai-mlflow,localhost,127.0.0.1
                securityContext:
                  runAsUser: 1000
                  allowPrivilegeEscalation: false
                  capabilities:
                    drop: ["ALL"]
                lifecycle:
                  preStop:
                    exec:
                      command: ["/bin/sh", "-c", "ray stop"]

      - groupName: h100-group
        replicas: 0
        minReplicas: 0
        maxReplicas: 2
        template:
          spec:
            securityContext:
              fsGroupChangePolicy: OnRootMismatch
              runAsNonRoot: true
              seccompProfile:
                type: RuntimeDefault
            nodeSelector:
              nvidia.com/gpu.product: NVIDIA-H100-NVL
            containers:
              - name: ray-worker
                image: rayproject/ray:2.49.2-py312-gpu
                resources:
                  limits:
                    cpu: 4
                    memory: 10Gi
                    nvidia.com/gpu: 1
                  requests:
                    cpu: 4
                    memory: 10Gi
                    nvidia.com/gpu: 1
                env:
                  - name: HTTPS_PROXY
                    value: http://proxy.muni.cz:3128
                  - name: NO_PROXY
                    value: .svc.cluster.local,.rationai-mlflow,localhost,127.0.0.1
                securityContext:
                  runAsUser: 1000
                  allowPrivilegeEscalation: false
                  capabilities:
                    drop: ["ALL"]
                lifecycle:
                  preStop:
                    exec:
                      command: ["/bin/sh", "-c", "ray stop"]
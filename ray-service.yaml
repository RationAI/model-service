apiVersion: ray.io/v1
kind: RayService
metadata:
  name: rayservice-models
spec:
  serveConfigV2: |
    applications:
      - name: prostate-classifier-1
        import_path: models.binary_classifier:app
        route_prefix: /prostate-classifier-1
        runtime_env:
          working_dir: https://gitlab.ics.muni.cz/rationai/infrastructure/model-service/-/archive/master/model-service-master.zip
        deployments:
          - name: BinaryClassifier
            max_ongoing_requests: 64
            max_queued_requests: 128
            autoscaling_config:
              min_replicas: 0
              max_replicas: 4
              target_ongoing_requests: 32
            ray_actor_options:
              num_cpus: 6
              memory: 6442450944 # 6 GiB
              runtime_env:
                pip: ["onnxruntime>=1.23.2", "mlflow<3.0", "lz4>=4.4.5"]
                env_vars:
                  MLFLOW_TRACKING_URI: http://mlflow.rationai-mlflow:5000
            user_config:
              tile_size: 512
              max_batch_size: 32
              batch_wait_timeout_s: 0.5
              mean: [228.5544, 178.8584, 219.8793]
              std: [27.8285, 51.4639, 26.4458]
              intra_op_num_threads: 5
              model:
                _target_: providers.model_provider:mlflow
                artifact_uri: mlflow-artifacts:/65/aebc892f526047249b972f200bef4381/artifacts/checkpoints/epoch=0-step=6972/model.onnx

      - name: episeg-1
        import_path: models.semantic_segmentation:app
        route_prefix: /episeg-1
        runtime_env:
          working_dir: https://gitlab.ics.muni.cz/rationai/infrastructure/model-service/-/archive/master/model-service-master.zip
        deployments:
          - name: SemanticSegmentation
            max_ongoing_requests: 16
            max_queued_requests: 64
            autoscaling_config:
              min_replicas: 0
              max_replicas: 2
              target_ongoing_requests: 4
            ray_actor_options:
              num_cpus: 12
              memory: 12884901888 # 12 GiB
              runtime_env:
                pip: ["onnxruntime>=1.23.2", "mlflow<3.0", "lz4>=4.4.5"]
                env_vars:
                  MLFLOW_TRACKING_URI: http://mlflow.rationai-mlflow:5000
            user_config:
              tile_size: 1024
              max_batch_size: 2
              batch_wait_timeout_s: 0.5
              intra_op_num_threads: 11
              model:
                _target_: providers.model_provider:mlflow
                artifact_uri: mlflow-artifacts:/10/39f821ed5b964c71a603cc6db196f9fd/artifacts/checkpoints/epoch=19-step=32020/model.onnx/model.onnx

  rayClusterConfig:
    rayVersion: 2.52.1
    enableInTreeAutoscaling: true
    autoscalerOptions:
      idleTimeoutSeconds: 60
      securityContext:
        runAsUser: 1000
        allowPrivilegeEscalation: false
        capabilities:
          drop: ["ALL"]

    headGroupSpec:
      rayStartParams:
        num-cpus: "0"
        dashboard-host: "0.0.0.0"
      template:
        spec:
          securityContext:
            fsGroupChangePolicy: OnRootMismatch
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: ray-head
              image: rayproject/ray:2.52.1-py312
              resources:
                limits:
                  cpu: 0
                  memory: 4Gi
                requests:
                  cpu: 0
                  memory: 4Gi
              ports:
                - containerPort: 6379
                  name: gcs-server
                - containerPort: 8265
                  name: dashboard
                - containerPort: 10001
                  name: client
                - containerPort: 8000
                  name: serve
              securityContext:
                runAsUser: 1000
                allowPrivilegeEscalation: false
                capabilities:
                  drop: ["ALL"]

    workerGroupSpecs:
      - groupName: cpu-workers
        replicas: 0
        minReplicas: 0
        maxReplicas: 2
        template:
          spec:
            securityContext:
              fsGroupChangePolicy: OnRootMismatch
              runAsNonRoot: true
              seccompProfile:
                type: RuntimeDefault
            containers:
              - name: ray-worker
                image: rayproject/ray:2.52.1-py312
                resources:
                  limits:
                    cpu: 12
                    memory: 12Gi
                  requests:
                    cpu: 12
                    memory: 12Gi
                env:
                  - name: HTTPS_PROXY
                    value: http://proxy.ics.muni.cz:3128
                securityContext:
                  allowPrivilegeEscalation: false
                  capabilities:
                    drop: ["ALL"]
                  runAsUser: 1000
                lifecycle:
                  preStop:
                    exec:
                      command: ["/bin/sh", "-c", "ray stop"]

site_name: Model Service Documentation
site_description: Model deployment infrastructure for RationAI using Ray Serve on Kubernetes
repo_url: https://gitlab.ics.muni.cz/rationai/infrastructure/model-service
edit_uri: -/edit/master/docs/

theme:
  name: material
  palette:
    primary: indigo
    accent: indigo
  features:
    - navigation.tabs
    - navigation.sections
    - toc.integrate
    - search.suggest
    - search.highlight
    - content.code.copy

nav:
  - Home: index.md
  - Get Started:
      - Quick Start: get-started/quick-start.md
      - Installation: https://docs.ray.io/en/latest/cluster/kubernetes/getting-started/kuberay-operator-installation.html
      - First Deployment: https://docs.ray.io/en/latest/serve/production-guide/kubernetes.html
  - Guides:
      - Deployment Guide: guides/deployment-guide.md
      - Adding New Models: guides/adding-models.md
      - Configuration Reference: guides/configuration-reference.md
      - Troubleshooting: guides/troubleshooting.md
  - Architecture:
      - Overview: architecture/overview.md
      - Request Lifecycle: architecture/request-lifecycle.md
      - Batching: architecture/batching.md
      - Queues and Backpressure: architecture/queues-and-backpressure.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true